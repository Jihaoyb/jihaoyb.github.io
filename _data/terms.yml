# Glossary for Lab posts. Render a term with:
#   {% include term.html id="jekyll" %}            -> displays the entry name
#   {% include term.html id="yaml" text="YAML" %}  -> displays custom text
# Convention: only the FIRST mention of a term in a post gets the treatment.
# Definitions are plain text (no Markdown) — they render both in the hover
# card and in the "Terms in this post" footer. url/link_text are optional.

jekyll:
  name: Jekyll
  def: "A static site generator written in Ruby. It takes plain text files — Markdown, data, templates — and compiles them into a complete website with no database or server-side code."
  url: https://jekyllrb.com
  link_text: Official site

static-site-generator:
  name: Static site generator
  def: "A tool that builds a website ahead of time: content and templates go in, plain HTML/CSS/JS files come out, and any web server can host the result as-is."
  url: https://developer.mozilla.org/en-US/docs/Glossary/SSG
  link_text: MDN glossary

front-matter:
  name: Front matter
  def: "The YAML block between two --- lines at the top of a file. Jekyll reads it as that page's settings and variables — layout, title, permalink, anything a template needs."
  url: https://jekyllrb.com/docs/front-matter/
  link_text: Jekyll docs

yaml:
  name: YAML
  def: "A human-friendly format for structured data: key–value pairs, lists, and nesting expressed with indentation. The go-to format for configuration files."
  url: https://yaml.org
  link_text: Official site

liquid:
  name: Liquid
  def: "The templating language Jekyll uses, created by Shopify. Curly-brace tags run logic — loops, conditionals, includes — and double curly braces print values into the page."
  url: https://shopify.github.io/liquid/
  link_text: Official docs

markdown:
  name: Markdown
  def: "A lightweight plain-text syntax for formatted writing — headings, emphasis, lists typed as ordinary characters — that converts cleanly to HTML."
  url: https://daringfireball.net/projects/markdown/
  link_text: Original spec

github-pages:
  name: GitHub Pages
  def: "GitHub's free static hosting. Push a repository and it builds the site (running Jekyll for you) and serves the result — this site deploys that way on every push to main."
  url: https://pages.github.com
  link_text: Official site

giscus:
  name: giscus
  def: "An open-source comments widget that stores each page's comments and reactions in a GitHub Discussion — no server or database of your own to run."
  url: https://giscus.app
  link_text: Official site

github-discussions:
  name: GitHub Discussions
  def: "Forum-style threads attached to a GitHub repository, with Markdown comments, replies, and emoji reactions. Free with every public repo."
  url: https://docs.github.com/en/discussions
  link_text: GitHub docs

iframe:
  name: iframe
  def: "An HTML element that embeds one web page inside another. The embedded page runs isolated on its own origin, so it cannot read or change the host page."
  url: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/iframe
  link_text: MDN reference

postmessage:
  name: postMessage
  def: "The browser API for safely sending data between windows from different origins — for example between a page and the iframe it embeds."
  url: https://developer.mozilla.org/en-US/docs/Web/API/Window/postMessage
  link_text: MDN reference

github-actions:
  name: GitHub Actions
  def: "GitHub's built-in automation: workflows defined in YAML run on GitHub's servers in response to events — pushes, schedules, button clicks — with access to the repository."
  url: https://docs.github.com/en/actions
  link_text: GitHub docs

cron:
  name: cron
  def: "The classic Unix scheduler syntax: five fields (minute, hour, day, month, weekday) describing when a job runs. \"23 9 * * *\" means 09:23 UTC, daily."
  url: https://en.wikipedia.org/wiki/Cron
  link_text: Wikipedia

sha:
  name: commit SHA
  def: "The unique fingerprint Git computes for every commit. If two SHAs match, the code is identical — which makes them perfect for cheap change detection."
  url: https://git-scm.com/book/en/v2/Git-Internals-Git-Objects
  link_text: Git book

pull-request:
  name: pull request
  def: "A proposed set of changes to a repository, presented as a reviewable diff. Nothing merges until a human approves — the standard review gate."
  url: https://docs.github.com/en/pull-requests
  link_text: GitHub docs

reflow:
  name: reflow
  def: "The browser recomputing the geometry of the page after a change — or on demand, when code reads a measurement like offsetHeight. In hot paths it's one of the most expensive things a page can do."
  url: https://developer.mozilla.org/en-US/docs/Glossary/Reflow
  link_text: MDN glossary

virtualization:
  name: virtualization
  def: "Rendering only the list items currently on screen (plus a small buffer) instead of thousands of DOM nodes. It needs to know every item's height in advance — which, for text, is exactly the hard part."

es-modules:
  name: ES modules
  def: "The browser's native import/export system. A script tag with type=\"module\" can import straight from a URL — no bundler or build step required."
  url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Modules
  link_text: MDN reference

dom:
  name: DOM
  def: "The Document Object Model — the live tree of objects a browser builds from HTML, which JavaScript reads and edits. Every visual change flows through it, and so does every layout question you ask it."
  url: https://developer.mozilla.org/en-US/docs/Web/API/Document_Object_Model
  link_text: MDN reference

canvas:
  name: canvas
  def: "The HTML element that hands JavaScript a raw drawing surface. It can also measure text using the browser's own font engine — without adding anything to the page."
  url: https://developer.mozilla.org/en-US/docs/Web/API/Canvas_API
  link_text: MDN reference

cdn:
  name: CDN
  def: "A content delivery network — servers hosting files close to users. For a library, it means a URL you can import from directly: no install, no build."
  url: https://developer.mozilla.org/en-US/docs/Glossary/CDN
  link_text: MDN glossary

layout-shift:
  name: layout shift
  def: "Content visibly jumping as late-arriving pieces push the page around. Measured as CLS — Cumulative Layout Shift — one of Google's Core Web Vitals."
  url: https://web.dev/articles/cls
  link_text: web.dev

serverless:
  name: serverless
  def: "Running code as small functions on someone else's always-on infrastructure — no server of yours to provision, patch, or pay for while it idles."
  url: https://www.cloudflare.com/learning/serverless/what-is-serverless/
  link_text: Cloudflare Learning

pretext:
  name: Pretext
  def: "A TypeScript library by Cheng Lou that measures and lays out multiline text with pure arithmetic — no DOM, no reflow — using the browser's own font engine as ground truth."
  url: https://github.com/chenglou/pretext
  link_text: GitHub repo
