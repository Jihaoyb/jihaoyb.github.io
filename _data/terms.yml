# Glossary for Lab posts. Render a term with:
#   {% include term.html id="jekyll" %}            -> displays the entry name
#   {% include term.html id="yaml" text="YAML" %}  -> displays custom text
# Convention: only the FIRST mention of a term in a post gets the treatment.
# Definitions are plain text (no Markdown) — they render both in the hover
# card and in the "Terms in this post" footer. url/link_text are optional.

jekyll:
  name: Jekyll
  def: "A static site generator written in Ruby. It takes plain text files — Markdown, data, templates — and compiles them into a complete website with no database or server-side code."
  url: https://jekyllrb.com
  link_text: Official site

static-site-generator:
  name: Static site generator
  def: "A tool that builds a website ahead of time: content and templates go in, plain HTML/CSS/JS files come out, and any web server can host the result as-is."
  url: https://developer.mozilla.org/en-US/docs/Glossary/SSG
  link_text: MDN glossary

front-matter:
  name: Front matter
  def: "The YAML block between two --- lines at the top of a file. Jekyll reads it as that page's settings and variables — layout, title, permalink, anything a template needs."
  url: https://jekyllrb.com/docs/front-matter/
  link_text: Jekyll docs

yaml:
  name: YAML
  def: "A human-friendly format for structured data: key–value pairs, lists, and nesting expressed with indentation. The go-to format for configuration files."
  url: https://yaml.org
  link_text: Official site

liquid:
  name: Liquid
  def: "The templating language Jekyll uses, created by Shopify. Curly-brace tags run logic — loops, conditionals, includes — and double curly braces print values into the page."
  url: https://shopify.github.io/liquid/
  link_text: Official docs

markdown:
  name: Markdown
  def: "A lightweight plain-text syntax for formatted writing — headings, emphasis, lists typed as ordinary characters — that converts cleanly to HTML."
  url: https://daringfireball.net/projects/markdown/
  link_text: Original spec

github-pages:
  name: GitHub Pages
  def: "GitHub's free static hosting. Push a repository and it builds the site (running Jekyll for you) and serves the result — this site deploys that way on every push to main."
  url: https://pages.github.com
  link_text: Official site

giscus:
  name: giscus
  def: "An open-source comments widget that stores each page's comments and reactions in a GitHub Discussion — no server or database of your own to run."
  url: https://giscus.app
  link_text: Official site

github-discussions:
  name: GitHub Discussions
  def: "Forum-style threads attached to a GitHub repository, with Markdown comments, replies, and emoji reactions. Free with every public repo."
  url: https://docs.github.com/en/discussions
  link_text: GitHub docs

iframe:
  name: iframe
  def: "An HTML element that embeds one web page inside another. The embedded page runs isolated on its own origin, so it cannot read or change the host page."
  url: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/iframe
  link_text: MDN reference

postmessage:
  name: postMessage
  def: "The browser API for safely sending data between windows from different origins — for example between a page and the iframe it embeds."
  url: https://developer.mozilla.org/en-US/docs/Web/API/Window/postMessage
  link_text: MDN reference

github-actions:
  name: GitHub Actions
  def: "GitHub's built-in automation: workflows defined in YAML run on GitHub's servers in response to events — pushes, schedules, button clicks — with access to the repository."
  url: https://docs.github.com/en/actions
  link_text: GitHub docs

cron:
  name: cron
  def: "The classic Unix scheduler syntax: five fields (minute, hour, day, month, weekday) describing when a job runs. \"23 9 * * *\" means 09:23 UTC, daily."
  url: https://en.wikipedia.org/wiki/Cron
  link_text: Wikipedia

sha:
  name: commit SHA
  def: "The unique fingerprint Git computes for every commit. If two SHAs match, the code is identical — which makes them perfect for cheap change detection."
  url: https://git-scm.com/book/en/v2/Git-Internals-Git-Objects
  link_text: Git book

pull-request:
  name: pull request
  def: "A proposed set of changes to a repository, presented as a reviewable diff. Nothing merges until a human approves — the standard review gate."
  url: https://docs.github.com/en/pull-requests
  link_text: GitHub docs

reflow:
  name: reflow
  def: "The browser recomputing the geometry of the page after a change — or on demand, when code reads a measurement like offsetHeight. In hot paths it's one of the most expensive things a page can do."
  url: https://developer.mozilla.org/en-US/docs/Glossary/Reflow
  link_text: MDN glossary

virtualization:
  name: virtualization
  def: "Rendering only the list items currently on screen (plus a small buffer) instead of thousands of DOM nodes. It needs to know every item's height in advance — which, for text, is exactly the hard part."

es-modules:
  name: ES modules
  def: "The browser's native import/export system. A script tag with type=\"module\" can import straight from a URL — no bundler or build step required."
  url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Modules
  link_text: MDN reference

dom:
  name: DOM
  def: "The Document Object Model — the live tree of objects a browser builds from HTML, which JavaScript reads and edits. Every visual change flows through it, and so does every layout question you ask it."
  url: https://developer.mozilla.org/en-US/docs/Web/API/Document_Object_Model
  link_text: MDN reference

canvas:
  name: canvas
  def: "The HTML element that hands JavaScript a raw drawing surface. It can also measure text using the browser's own font engine — without adding anything to the page."
  url: https://developer.mozilla.org/en-US/docs/Web/API/Canvas_API
  link_text: MDN reference

cdn:
  name: CDN
  def: "A content delivery network — servers hosting files close to users. For a library, it means a URL you can import from directly: no install, no build."
  url: https://developer.mozilla.org/en-US/docs/Glossary/CDN
  link_text: MDN glossary

layout-shift:
  name: layout shift
  def: "Content visibly jumping as late-arriving pieces push the page around. Measured as CLS — Cumulative Layout Shift — one of Google's Core Web Vitals."
  url: https://web.dev/articles/cls
  link_text: web.dev

serverless:
  name: serverless
  def: "Running code as small functions on someone else's always-on infrastructure — no server of yours to provision, patch, or pay for while it idles."
  url: https://www.cloudflare.com/learning/serverless/what-is-serverless/
  link_text: Cloudflare Learning

pretext:
  name: Pretext
  def: "A TypeScript library by Cheng Lou that measures and lays out multiline text with pure arithmetic — no DOM, no reflow — using the browser's own font engine as ground truth."
  url: https://github.com/chenglou/pretext
  link_text: GitHub repo

render-blocking:
  name: render-blocking
  def: "A resource the browser refuses to paint without — stylesheets in the head are the classic case. Until every one has downloaded, the page shows nothing at all, no matter how fast the HTML arrived."
  url: https://developer.mozilla.org/en-US/docs/Web/Performance/Guides/Critical_rendering_path
  link_text: MDN guide

critical-css:
  name: critical CSS
  def: "The handful of style rules the very first paint cannot do without, inlined into the HTML itself so they apply before any stylesheet finishes downloading. The rest of the CSS loads normally."
  url: https://web.dev/articles/extract-critical-css
  link_text: web.dev

local-storage:
  name: localStorage
  def: "A small per-site key-value store the browser persists across visits. Synchronous to read, capped at a few megabytes, and the standard home for lightweight preferences like a theme choice."
  url: https://developer.mozilla.org/en-US/docs/Web/API/Window/localStorage
  link_text: MDN reference

http-status-code:
  name: HTTP status code
  def: "The three-digit verdict on every web request. The first digit is the class — 2xx success, 3xx redirect, 4xx client error, 5xx server error — so a 204 is a success that simply has no body to return, not a problem."
  url: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status
  link_text: MDN reference

view-transitions: 
  name: View Transitions
  def: "A browser API that animates between two page states — including full cross-document navigations — by snapshotting the old view and transitioning to the new one. Pages opt in with a one-line CSS rule; the browser does the choreography."
  url: https://developer.mozilla.org/en-US/docs/Web/API/View_Transition_API
  link_text: MDN reference

promise:
  name: promise
  def: "JavaScript's placeholder for a value that isn't ready yet. It settles exactly once — fulfilled or rejected — and a rejection nobody attaches a handler to gets reported in the console as an uncaught error."
  url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise
  link_text: MDN reference

waterfall:
  name: network waterfall
  def: "DevTools' timeline of every request a page makes — each row a resource, each bar showing when it started and how long it took. Reading the shape (what blocked what, what fired last) is half of frontend debugging."
  url: https://developer.chrome.com/docs/devtools/network
  link_text: Chrome DevTools docs

beacon:
  name: beacon
  def: "A tiny fire-and-forget request that reports something — a page view, a metric — without expecting anything back. Beacon endpoints reply 204 by design: received, nothing to say."
  url: https://developer.mozilla.org/en-US/docs/Web/API/Beacon_API
  link_text: MDN reference

graceful-degradation:
  name: graceful degradation
  def: "Designing features to fall back rather than fall over: when the fancy path can't run — old browser, hidden tab, slow network — a simpler version still ships the outcome. The animation is optional; the page change is not."
  url: https://developer.mozilla.org/en-US/docs/Glossary/Graceful_degradation
  link_text: MDN glossary

screen-reader:
  name: screen reader
  def: "Assistive software that speaks the page aloud or drives a braille display. It navigates the accessibility tree — the browser's parallel outline of the page — not the pixels, so what it announces can differ from what sighted users see."
  url: https://developer.mozilla.org/en-US/docs/Web/Accessibility/Guides/Information_for_developers
  link_text: MDN accessibility

wcag:
  name: WCAG
  def: "The Web Content Accessibility Guidelines — the W3C standard behind most accessibility audits and regulations. Level AA is the common bar; its contrast rule asks 4.5:1 for body text and 3:1 for large type."
  url: https://www.w3.org/WAI/standards-guidelines/wcag/
  link_text: W3C overview

lighthouse:
  name: Lighthouse
  def: "Chrome's built-in site auditor: one run scores performance, accessibility, best practices, and SEO in an emulated environment, then lists the exact failing audits. Free, already in DevTools, and most developers have never opened it."
  url: https://developer.chrome.com/docs/lighthouse/overview
  link_text: Chrome docs

core-web-vitals:
  name: Core Web Vitals
  def: "Google's field metrics for real-user experience — LCP for when the main content lands, CLS for how much the layout jumps, INP for how fast the page reacts — measured on actual visitors and weighed by search."
  url: https://web.dev/articles/vitals
  link_text: web.dev

variable-fonts:
  name: variable fonts
  def: "One font file carrying a whole design space — weights 400 through 700 interpolated from a single download instead of four separate files. Smaller on the wire, one request instead of many."
  url: https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_fonts/Variable_fonts_guide
  link_text: MDN guide

cache-control:
  name: Cache-Control
  def: "The HTTP header where a server declares how long a response may be reused without asking again. max-age=600 means: for ten minutes, don't even check with me."
  url: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Cache-Control
  link_text: MDN reference

etag:
  name: ETag
  def: "A response's fingerprint. A browser sends it back as If-None-Match, and when nothing changed the server answers 304 Not Modified with an empty body — a stale cache revalidated for the price of a handshake."
  url: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/ETag
  link_text: MDN reference
