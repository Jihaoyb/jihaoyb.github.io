<header class="portfolio-header" data-portfolio-header>
  <div class="portfolio-header__inner">
    <a class="portfolio-brand" href="{{ base_path }}/">JY</a>

    <!-- Inline on desktop; collapses into a slide-down panel under the bar on mobile. -->
    <div class="portfolio-menu" id="site-menu" data-nav-menu>
      <nav class="portfolio-nav" aria-label="Primary">
        <a href="/#about">About</a>
        <a href="/#projects">Projects</a>
        <a href="/#experience">Experience</a>
        <a href="/#capabilities">Capabilities</a>
        <a href="/#personal">Personal</a>
        <a href="/lab/">Lab</a>
        <a href="/#contact">Contact</a>
      </nav>
      <div class="portfolio-actions">
        <a class="btn btn--primary btn--small" href="{{ base_path }}/files/Jihao_Ye_Resume.pdf">Resume</a>
        <a class="btn btn--primary btn--small" href="mailto:{{ site.author.email }}">Contact</a>
      </div>
    </div>

    <div class="portfolio-header__controls">
      <!-- Cycles system -> light -> dark; icon reflects state via CSS. -->
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme">
        <svg class="theme-toggle__icon theme-toggle__icon--auto" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"></path></svg>
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"></path></svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg>
      </button>
      <!-- Hamburger: toggles the slide-down menu below the nav breakpoint. -->
      <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-controls="site-menu" aria-label="Open menu">
        <span class="nav-toggle__bars" aria-hidden="true"></span>
      </button>
    </div>
  </div>
</header>
