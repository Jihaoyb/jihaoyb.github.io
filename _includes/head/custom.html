{% include base_path %}

<!-- The theme boot script and first-paint styles live in head.html, above the
     render-blocking stylesheet — they must run before it, and everything in
     this include is parsed after it. -->

<link rel="icon" href="{{ base_path }}/images/favicon.ico" sizes="any">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg?v=M44lzPylqQ" color="#000000">
<meta name="msapplication-TileColor" content="#000000">
<meta name="msapplication-TileImage" content="{{ base_path }}/images/mstile-144x144.png?v=M44lzPylqQ">
<meta name="msapplication-config" content="{{ base_path }}/images/browserconfig.xml?v=M44lzPylqQ">
<meta name="theme-color" content="#f6f1e9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#18140f" media="(prefers-color-scheme: dark)">

{% if page.author_profile != false %}
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.min.css">
{% endif %}

<!-- Self-hosted fonts (see @font-face in _portfolio.scss). Preloaded on
     every page — both families style all text site-wide. crossorigin is
     required on font preloads even same-origin (font fetches are CORS mode);
     without it the preload is discarded and the font downloads twice. -->
<link rel="preload" as="font" type="font/woff2" href="{{ base_path }}/assets/fonts/space-grotesk-latin-var.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="{{ base_path }}/assets/fonts/fraunces-latin-var.woff2" crossorigin>
{% if page.url == "/" %}
<link rel="preload" as="image" href="{{ base_path }}/images/jihao-photo-640.webp" imagesrcset="{{ base_path }}/images/jihao-photo-480.webp 480w, {{ base_path }}/images/jihao-photo-640.webp 640w, {{ base_path }}/images/jihao-photo.webp 800w" imagesizes="(max-width: 900px) 87vw, 474px" fetchpriority="high">
{% endif %}

{% if page.mathjax %}
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}
