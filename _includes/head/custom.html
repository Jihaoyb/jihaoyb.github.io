{% include base_path %}

<link rel="icon" href="{{ base_path }}/images/favicon.ico" sizes="any">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg?v=M44lzPylqQ" color="#000000">
<meta name="msapplication-TileColor" content="#000000">
<meta name="msapplication-TileImage" content="{{ base_path }}/images/mstile-144x144.png?v=M44lzPylqQ">
<meta name="msapplication-config" content="{{ base_path }}/images/browserconfig.xml?v=M44lzPylqQ">
<meta name="theme-color" content="#ffffff">

{% if page.author_profile != false %}
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.min.css">
{% endif %}

{% if page.layout == "home" %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
{% if page.url == "/" %}
<link rel="preload" as="image" href="{{ base_path }}/images/jihao-photo.jpg" fetchpriority="high">
{% endif %}
{% endif %}

{% if page.mathjax %}
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}
